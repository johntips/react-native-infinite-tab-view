version: 2
updates:
  # ---- npm ----
  # Noise control strategy:
  # - Group ALL minor + patch updates into ONE weekly PR
  # - Ignore major bumps entirely (too risky for auto-PR, upgrade manually with Claude Code)
  # - Limit to 2 open PRs at a time to avoid flood on Monday morning
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    groups:
      all-non-major:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      # Ignore all major bumps — upgrade manually when intentional
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - "type:chore"
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # ---- github-actions ----
  # Group all action updates into one PR per week
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    groups:
      all-actions:
        patterns:
          - "*"
    labels:
      - "type:chore"
    commit-message:
      prefix: "chore(ci)"
