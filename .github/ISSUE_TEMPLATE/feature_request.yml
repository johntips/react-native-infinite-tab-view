name: ✨ Feature request
description: Suggest a new feature or enhancement
labels: ["type:feature", "status:needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
      placeholder: |
        Describe the pain point or missing capability.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried?

  - type: checkboxes
    id: willingness
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a pull request for this feature
