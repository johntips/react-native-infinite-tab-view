version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # Group minor/patch updates into one PR per week
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    labels:
      - "type:chore"
    commit-message:
      prefix: "chore(deps)"
      include: scope
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - "type:chore"
    commit-message:
      prefix: "chore(ci)"
